<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost Wanderer</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background-color: #0f3460;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #e94560;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 2px solid #00ffcc;
        }
        .message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #a0a0a0;
        }
        .home-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #e94560;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .home-link:hover {
            background-color: #00ffcc;
            color: #162447;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <img src="/assets/404.png" alt="Lost Wanderer">
        <div class="message">
            <strong>Vagus perditus?</strong><br>
            (Are you lost?)<br>
            The path <em>{{path}}</em> does not exist in our maps.
        </div>
        <a href="/" class="home-link">Return to Port</a>
    </div>
</body>
</html>
