<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #162447;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #0f3460;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            text-align: center;
            color: #e94560;
        }
        .ascii {
            white-space: pre;
            font-size: 1.2rem;
            color: #00ffcc;
            margin-bottom: 20px;
            text-align: left;
            display: inline-block;
        }
        .proverb {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
        }
        .translation {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ascii">  _____                   _             _ 
 |_   _|___ _ __ _ __ ___(_)_ __   __ _| |
   | |/ _ \ '__| '_ ` _ \| | '_ \ / _` | |
   | |  __/ |  | | | | | | | | | | (_| | |
   |_|\___|_|  |_| |_| |_|\__,_|_|</div>
        <div class="proverb">"{{latin}}"</div>
        <div class="translation">- {{english}}</div>
        <p style="color: #fff; margin-top: 30px;">(Try curling this page from your terminal! <code>curl http://localhost:{{port}}</code>)</p>
    </div>
</body>
</html>
